<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>SSR Bullion | Live Rates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { blue: '#004ee7', light: '#EEF2FC' },
            success: { bg: '#b0f0d6', text: '#006B44' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#F8F9FB] text-slate-800 font-sans h-screen w-screen overflow-hidden antialiased flex justify-center">
  <div class="h-full w-full max-w-[430px] relative flex flex-col bg-white overflow-hidden shadow-2xl">
    
    <!-- Header -->
    <header class="pt-10 pb-4 bg-white shrink-0">
       <h1 class="text-brand-blue font-bold text-[28px] tracking-wide text-center">SSR BULLION</h1>
    </header>

    <!-- App Background & Content -->
    <div class="flex-1 bg-[#F8F9FB] overflow-y-auto hide-scrollbar pb-28 relative">
        
        <!-- Toggle -->
        <div class="flex justify-center pt-6 px-4">
            <div class="bg-brand-light rounded-full p-1 flex w-full max-w-[280px]">
                <button class="flex-1 py-2.5 bg-brand-blue text-white rounded-full font-semibold shadow-sm text-[15px]">Gold</button>
                <button class="flex-1 py-2.5 text-slate-500 font-semibold text-[15px]">Silver</button>
            </div>
        </div>

        <!-- 24K Gold Main Card -->
        <div class="px-4 mt-6">
            <div class="bg-white rounded-[2rem] shadow-[0_8px_30px_rgba(0,0,0,0.04)] relative">
                <div class="pt-8 pb-10 flex flex-col items-center">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="bg-slate-100 text-slate-600 text-[11px] font-bold px-2 py-0.5 rounded tracking-wide">99.99%</span>
                        <span class="text-slate-800 text-[19px] font-medium">24K Fine Gold</span>
                    </div>
                    <div class="flex items-baseline justify-center gap-1 mt-1">
                        <span id="gold-buy" class="text-brand-blue text-[44px] font-bold tracking-tight tabular-nums">--</span>
                        <span class="text-[13px] font-semibold text-slate-500 mb-2">/10g</span>
                    </div>
                    <div class="mt-4">
                        <span class="bg-success-bg text-success-text text-[13px] font-semibold px-3 py-1.5 rounded-full flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-[16px]">trending_up</span>
                            Live Update
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Purity Grid -->
        <div class="grid grid-cols-2 gap-4 px-4 mt-4">
            <!-- 22K -->
            <div class="bg-white rounded-2xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-slate-900 font-semibold text-[15px]">22K Gold</span>
                    <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded">91.6%</span>
                </div>
                <div class="text-[19px] font-bold text-slate-900 tabular-nums">₹<span id="gold-22k-price">--</span></div>
            </div>
            <!-- 20K -->
            <div class="bg-white rounded-2xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-slate-900 font-semibold text-[15px]">20K Gold</span>
                    <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded">83.3%</span>
                </div>
                <div class="text-[19px] font-bold text-slate-900 tabular-nums">₹<span id="gold-20k-price">--</span></div>
            </div>
            <!-- 18K -->
            <div class="bg-white rounded-2xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-slate-900 font-semibold text-[15px]">18K Gold</span>
                    <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded">75.0%</span>
                </div>
                <div class="text-[19px] font-bold text-slate-900 tabular-nums">₹<span id="gold-18k-price">--</span></div>
            </div>
            <!-- 14K -->
            <div class="bg-white rounded-2xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-slate-900 font-semibold text-[15px]">14K Gold</span>
                    <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded">58.3%</span>
                </div>
                <div class="text-[19px] font-bold text-slate-900 tabular-nums">₹<span id="gold-14k-price">--</span></div>
            </div>
            <!-- 9K (Full Width) -->
            <div class="col-span-2 bg-white rounded-2xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-slate-900 font-semibold text-[15px]">9K Gold</span>
                    <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded">37.5%</span>
                </div>
                <div class="text-[19px] font-bold text-slate-900 tabular-nums">₹<span id="gold-9k-price">--</span></div>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="absolute bottom-5 left-4 right-4 z-40">
        <div class="bg-white rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.08)] px-2 py-3 flex justify-between items-center border border-slate-100">
            <button class="flex-1 flex flex-col items-center gap-1 text-brand-blue transition-colors">
                <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">show_chart</span>
                <span class="text-[11px] font-bold tracking-wide">Markets</span>
            </button>
            <button class="flex-1 flex flex-col items-center gap-1 text-slate-800 transition-colors">
                <span class="material-symbols-outlined">account_balance</span>
                <span class="text-[11px] font-semibold tracking-wide">Bank Info</span>
            </button>
            <button class="flex-1 flex flex-col items-center gap-1 text-slate-800 transition-colors">
                <span class="material-symbols-outlined">insights</span>
                <span class="text-[11px] font-semibold tracking-wide">Intelligence</span>
            </button>
             <button class="flex-1 flex flex-col items-center gap-1 text-slate-800 transition-colors">
                <span class="material-symbols-outlined">shield_person</span>
                <span class="text-[11px] font-semibold tracking-wide">Secure</span>
            </button>
        </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
