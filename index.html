<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>SSR Bullion | Live Rates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { blue: '#004ee7', light: '#EEF2FC' },
            success: { bg: '#b0f0d6', text: '#006B44' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#F8F9FB] text-slate-800 font-sans h-screen w-screen overflow-hidden antialiased flex justify-center">
    <!-- Dynamic Sparkline Gradients -->
    <svg width="0" height="0" class="hidden absolute">
        <defs>
            <linearGradient id="sparkline-gradient-blue" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
            </linearGradient>
            <linearGradient id="sparkline-gradient-green" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#16a34a" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#16a34a" stop-opacity="0.0"/>
            </linearGradient>
            <linearGradient id="sparkline-gradient-red" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#dc2626" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#dc2626" stop-opacity="0.0"/>
            </linearGradient>
        </defs>
    </svg>
  <div class="h-full w-full max-w-[430px] relative flex flex-col bg-white overflow-hidden shadow-2xl">
    
    <!-- Header (Increased size of the SSR BULLION box) -->
    <header class="pt-6 pb-4 bg-white shrink-0 relative z-10">
       <h1 class="text-brand-blue font-extrabold text-[28px] tracking-wide text-center drop-shadow-sm">SSR BULLION</h1>
    </header>

    <!-- App Background & Content -->
    <div class="flex-1 bg-[#F8F9FB] flex flex-col relative overflow-hidden">
        
        <!-- Toggle (Maintained exactly as is) -->
        <div class="flex justify-center pt-4 pb-1 px-4 shrink-0">
            <div class="bg-brand-light rounded-full p-2 flex w-full max-w-[300px] relative shadow-inner">
                <!-- Smooth Sliding Indicator -->
                <div id="tab-indicator" class="absolute top-2 bottom-2 left-2 w-[calc(50%-8px)] bg-brand-blue rounded-full shadow-md transition-transform duration-500 ease-in-out z-0 will-change-transform"></div>
                
                <button id="tab-gold" class="flex-1 py-1.5 text-white relative z-10 font-bold tracking-wide text-[15px] transition-colors duration-500">Gold</button>
                <button id="tab-silver" class="flex-1 py-1.5 text-slate-500 relative z-10 font-bold tracking-wide text-[15px] transition-colors duration-500 hover:text-slate-700">Silver</button>
            </div>
        </div>

        <!-- GOLD SECTION -->
        <div id="gold-section" class="flex-1 flex flex-col w-full transition-all duration-300 ease-out transform translate-x-0 opacity-100 h-full overflow-hidden">
            
            <!-- 24K Gold Main Card -->
            <div class="px-4 mt-3 flex-[0.8] flex flex-col min-h-[140px]">
                <div class="bg-white rounded-[1.5rem] shadow-[0_6px_20px_rgba(0,0,0,0.03)] flex-1 flex flex-col justify-center items-center relative px-4 py-3 overflow-hidden">
                    
                    <!-- Top: Purity and Title -->
                    <div class="flex justify-center items-center gap-2 mb-2.5 z-10 w-full">
                        <span class="bg-brand-light text-brand-blue text-[11px] font-bold px-2 py-0.5 rounded tracking-wide shrink-0">99.99%</span>
                        <span class="text-brand-blue text-[18px] font-extrabold whitespace-nowrap drop-shadow-sm">24K Fine Gold</span>
                    </div>

                    <!-- Middle: Gold Bar Image -->
                    <div class="w-[80px] h-[80px] rounded-full overflow-hidden shadow-sm border-2 border-brand-light z-20 mb-1.5 shrink-0">
                        <img src="/gold-bar-icon.jpg" alt="Gold Bar" class="w-full h-full object-cover">
                    </div>

                    <!-- Bottom: Price Content Centered -->
                    <div class="flex items-baseline justify-center gap-1 relative z-10 w-full">
                        <span id="gold-price" class="text-brand-blue text-[40px] font-bold tracking-tight tabular-nums leading-none">--</span>
                        <span class="text-[12px] font-semibold text-slate-500">/10g</span>
                    </div>
                </div>
            </div>

            <!-- Purity Grid (Increased flex ratio to balance the smaller main card) -->
            <div class="grid grid-cols-2 gap-2 px-4 mt-3 flex-[1.2] pb-[100px]">
                <!-- 22K -->
                <div class="bg-white rounded-2xl shadow-[0_3px_15px_rgba(0,0,0,0.03)] flex flex-col justify-start p-2.5 gap-2 relative overflow-hidden">
                    <div class="flex justify-between items-center w-full relative z-20">
                        <div class="w-9"></div>
                        <span class="text-brand-blue font-extrabold text-[13px] leading-none">22K Gold</span>
                        <div class="w-9 flex justify-end">
                            <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm leading-none">91.6%</span>
                        </div>
                    </div>
                    <div class="text-[17px] font-bold text-slate-900 tabular-nums relative z-10 text-left w-full">₹<span id="gold-22k-price">--</span></div>
                    <!-- Sparkline -->
                    <svg viewBox="0 0 100 40" preserveAspectRatio="none" class="absolute bottom-0 left-0 w-full h-[50%] opacity-40 pointer-events-none">
                        <defs>
                            <linearGradient id="gradient-22k" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
                                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
                            </linearGradient>
                        </defs>
                        <path id="gold-22k-sparkline-fill" fill="url(#gradient-22k)" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15 L 100 40 L 0 40 Z"></path>
                        <path id="gold-22k-sparkline-path" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15"></path>
                    </svg>
                </div>
                <!-- 20K -->
                <div class="bg-white rounded-2xl shadow-[0_3px_15px_rgba(0,0,0,0.03)] flex flex-col justify-start p-2.5 gap-2 relative overflow-hidden">
                    <div class="flex justify-between items-center w-full relative z-20">
                        <div class="w-9"></div>
                        <span class="text-brand-blue font-extrabold text-[13px] leading-none">20K Gold</span>
                        <div class="w-9 flex justify-end">
                            <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm leading-none">83.3%</span>
                        </div>
                    </div>
                    <div class="text-[17px] font-bold text-slate-900 tabular-nums relative z-10 text-left w-full">₹<span id="gold-20k-price">--</span></div>
                    <!-- Sparkline -->
                    <svg viewBox="0 0 100 40" preserveAspectRatio="none" class="absolute bottom-0 left-0 w-full h-[50%] opacity-40 pointer-events-none">
                        <defs>
                            <linearGradient id="gradient-20k" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
                                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
                            </linearGradient>
                        </defs>
                        <path id="gold-20k-sparkline-fill" fill="url(#gradient-20k)" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15 L 100 40 L 0 40 Z"></path>
                        <path id="gold-20k-sparkline-path" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15"></path>
                    </svg>
                </div>
                <!-- 18K -->
                <div class="bg-white rounded-2xl shadow-[0_3px_15px_rgba(0,0,0,0.03)] flex flex-col justify-start p-2.5 gap-2 relative overflow-hidden">
                    <div class="flex justify-between items-center w-full relative z-20">
                        <div class="w-9"></div>
                        <span class="text-brand-blue font-extrabold text-[13px] leading-none">18K Gold</span>
                        <div class="w-9 flex justify-end">
                            <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm leading-none">75.0%</span>
                        </div>
                    </div>
                    <div class="text-[17px] font-bold text-slate-900 tabular-nums relative z-10 text-left w-full">₹<span id="gold-18k-price">--</span></div>
                    <!-- Sparkline -->
                    <svg viewBox="0 0 100 40" preserveAspectRatio="none" class="absolute bottom-0 left-0 w-full h-[50%] opacity-40 pointer-events-none">
                        <defs>
                            <linearGradient id="gradient-18k" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
                                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
                            </linearGradient>
                        </defs>
                        <path id="gold-18k-sparkline-fill" fill="url(#gradient-18k)" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15 L 100 40 L 0 40 Z"></path>
                        <path id="gold-18k-sparkline-path" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15"></path>
                    </svg>
                </div>
                <!-- 14K -->
                <div class="bg-white rounded-2xl shadow-[0_3px_15px_rgba(0,0,0,0.03)] flex flex-col justify-start p-2.5 gap-2 relative overflow-hidden">
                    <div class="flex justify-between items-center w-full relative z-20">
                        <div class="w-9"></div>
                        <span class="text-brand-blue font-extrabold text-[13px] leading-none">14K Gold</span>
                        <div class="w-9 flex justify-end">
                            <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm leading-none">58.3%</span>
                        </div>
                    </div>
                    <div class="text-[17px] font-bold text-slate-900 tabular-nums relative z-10 text-left w-full">₹<span id="gold-14k-price">--</span></div>
                    <!-- Sparkline -->
                    <svg viewBox="0 0 100 40" preserveAspectRatio="none" class="absolute bottom-0 left-0 w-full h-[50%] opacity-40 pointer-events-none">
                        <defs>
                            <linearGradient id="gradient-14k" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
                                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
                            </linearGradient>
                        </defs>
                        <path id="gold-14k-sparkline-fill" fill="url(#gradient-14k)" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15 L 100 40 L 0 40 Z"></path>
                        <path id="gold-14k-sparkline-path" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15"></path>
                    </svg>
                </div>
                <!-- 9K (Horizontally Long via col-span-2) -->
                <div class="col-span-2 bg-white rounded-2xl shadow-[0_3px_15px_rgba(0,0,0,0.03)] flex flex-col justify-start p-2.5 gap-2 relative overflow-hidden">
                    <div class="flex justify-between items-center w-full relative z-20">
                        <div class="w-9"></div>
                        <span class="text-brand-blue font-extrabold text-[13px] leading-none">9K Gold</span>
                        <div class="w-9 flex justify-end">
                            <span class="bg-brand-light text-brand-blue text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm leading-none">37.5%</span>
                        </div>
                    </div>
                    <div class="text-[17px] font-bold text-slate-900 tabular-nums relative z-10 text-left w-full">₹<span id="gold-9k-price">--</span></div>
                    <!-- Sparkline -->
                    <svg viewBox="0 0 100 40" preserveAspectRatio="none" class="absolute bottom-0 left-0 w-full h-[50%] opacity-40 pointer-events-none">
                        <defs>
                            <linearGradient id="gradient-9k" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
                                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
                            </linearGradient>
                        </defs>
                        <path id="gold-9k-sparkline-fill" fill="url(#gradient-9k)" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15 L 100 40 L 0 40 Z"></path>
                        <path id="gold-9k-sparkline-path" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" d="M 0 30 C 20 25, 40 35, 60 20 C 80 5, 90 25, 100 15"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- SILVER SECTION -->
        <div id="silver-section" class="hidden absolute inset-0 pt-[74px] flex flex-col w-full transition-all duration-300 ease-out transform translate-x-4 opacity-0 h-full overflow-hidden">
            <!-- 999 Silver Main Card -->
            <div class="px-4 mt-3 flex-[0.8] flex flex-col min-h-[140px]">
                <div class="bg-white rounded-[1.5rem] shadow-[0_6px_20px_rgba(0,0,0,0.03)] flex-1 flex flex-col justify-center items-center relative py-2">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="bg-slate-100 text-slate-600 text-[11px] font-bold px-2 py-0.5 rounded tracking-wide">99.9%</span>
                        <span class="text-slate-800 text-[16px] font-medium">1KG Fine Silver</span>
                    </div>
                    <div class="flex items-baseline justify-center gap-1 mt-0.5">
                        <span id="silver-price" class="text-brand-blue text-[40px] font-bold tracking-tight tabular-nums">--</span>
                        <span class="text-[12px] font-semibold text-slate-500 mb-1">/1kg</span>
                    </div>
                </div>
            </div>
            <!-- Filler with exact pb-[100px] gap for bottom nav -->
            <div class="flex-[1.2] pb-[100px]"></div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="absolute bottom-5 left-4 right-4 z-40">
        <div class="bg-white rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.12)] px-2 py-2.5 flex justify-between items-center border border-slate-100">
            <button class="flex-1 flex flex-col items-center gap-0.5 text-brand-blue transition-colors">
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">show_chart</span>
                <span class="text-[10px] font-bold tracking-wide">Markets</span>
            </button>
            <button class="flex-1 flex flex-col items-center gap-0.5 text-slate-800 transition-colors">
                <span class="material-symbols-outlined text-[20px]">account_balance</span>
                <span class="text-[10px] font-semibold tracking-wide">Bank Info</span>
            </button>
            <button class="flex-1 flex flex-col items-center gap-0.5 text-slate-800 transition-colors">
                <span class="material-symbols-outlined text-[20px]">insights</span>
                <span class="text-[10px] font-semibold tracking-wide">Intelligence</span>
            </button>
             <button class="flex-1 flex flex-col items-center gap-0.5 text-slate-800 transition-colors">
                <span class="material-symbols-outlined text-[20px]">shield_person</span>
                <span class="text-[10px] font-semibold tracking-wide">Secure</span>
            </button>
        </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
